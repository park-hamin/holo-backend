spring.application.name=holo-backend

# 서버 포트 (프론트 Vite는 3000, 백엔드는 9045)
server.port=9045

# ===== PostgreSQL 연결 =====
# 프론트에서 만든 것과 같은 holo 데이터베이스에 연결한다.
spring.datasource.url=jdbc:postgresql://localhost:5432/holo
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# DB 비밀번호 등 민감정보는 git에 올리지 않는 로컬 파일에서 불러온다.
#   src/main/resources/application-local.properties  (이 파일은 .gitignore 처리됨)
# 다른 컴퓨터에서 프로젝트를 새로 받으면, 그 파일을 만들고 아래 한 줄을 넣으세요:
#   spring.datasource.password=본인_비밀번호
spring.config.import=optional:classpath:application-local.properties

# ===== JPA / Hibernate =====
# validate = 이미 만든 테이블과 Entity가 서로 맞는지 "검증만" 함 (테이블을 새로 만들거나 바꾸지 않음)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# 실행되는 SQL을 콘솔에 보여줌 (학습에 좋음)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
