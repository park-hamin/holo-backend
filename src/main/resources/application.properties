spring.application.name=holo-backend

# 서버 포트 (프론트 Vite는 3000, 백엔드는 8080)
server.port=8080

# ===== PostgreSQL 연결 =====
# 프론트에서 만든 것과 같은 holo 데이터베이스에 연결한다.
spring.datasource.url=jdbc:postgresql://localhost:5432/holo
spring.datasource.username=postgres
# 비밀번호는 코드에 직접 쓰지 않고 환경변수 DB_PASSWORD 로 주입 (git 노출 방지)
# IntelliJ 실행 설정(Environment variables) 또는 시스템 환경변수에
#   DB_PASSWORD=본인_비밀번호  를 등록하세요.
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# validate = 이미 만든 테이블과 Entity가 서로 맞는지 "검증만" 함 (테이블을 새로 만들거나 바꾸지 않음)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# 실행되는 SQL을 콘솔에 보여줌 (학습에 좋음)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
